<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Surat Rujuk Balik</title>
    <link rel="icon" href="logobpjs.png">

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            font-size: 14px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .title {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .right {
            text-align: right;
        }

        .table {
            margin-top: 10px;
        }

        .table td {
            padding: 3px 5px;
        }

        .footer {
            margin-top: 60px;
            text-align: right;
        }

        .btn {
            margin-bottom: 15px;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .print {
            background: green;
            color: white;
        }

        @media print {
            .no-print {
                display: none;
            }

            body {
                margin: 0;
            }
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- BUTTON -->
        <div class="no-print">
            <button class="btn print" onclick="window.print()">🖨 Print</button>
        </div>

        <!-- HEADER -->
        <div class="header">

            <!-- LOGO -->
            <div style="display:flex; align-items:center; gap:15px;">
                <img src="logo-bpjskesehatan.png" style="height:100px;">
            </div>

            <!-- NOMOR -->
            <div class="right">
                <div>No SRB : <span id="nosrb"></span></div>
                <div>Tanggal : <span id="tgl"></span></div>
            </div>

        </div>

        <!-- JUDUL -->
        <div class="title">
            SURAT RUJUK BALIK
        </div>

        <!-- KEPADA -->
        <table class="table">
            <tr>
                <td width="140">Kepada Yth</td>
                <td>: <span id="fktpTujuan"></span></td>
            </tr>
        </table>

        <p>Mohon pemeriksaan dan penanganan lebih lanjut:</p>

        <!-- DATA PASIEN -->
        <table class="table">
            <tr>
                <td width="140">Nama Peserta</td>
                <td>: <span id="nama"></span></td>
            </tr>
            <tr>
                <td>No. Kartu</td>
                <td>: <span id="bpjs"></span></td>
            </tr>
            <tr>
                <td>Tanggal Lahir</td>
                <td>: <span id="lahir"></span></td>
            </tr>
            <tr>
                <td>Diagnosa</td>
                <td>: <span id="diagnosa"></span></td>
            </tr>
            <tr>
                <td>Program PRB</td>
                <td>: <span id="program"></span></td>
            </tr>
            <tr>
                <td>Keterangan</td>
                <td>: <span id="keterangan"></span></td>
            </tr>
            <tr>
                <td>Saran</td>
                <td>: <span id="saran"></span></td>
            </tr>
            <tr>
                <td>Resep</td>
                <td>: <span id="resep"></span></td>
            </tr>
        </table>

        <p style="margin-top:20px;">
            Demikian atas bantuannya, diucapkan banyak terima kasih.
        </p>

        <!-- TTD -->
        <div class="footer">
            Mengetahui,<br><br><br>
            <b id="dokter"></b>
        </div>

    </div>

    <script>

        // ambil data
        let data = JSON.parse(localStorage.getItem("suratRujukan")) || {};

        // helper biar aman
        function safe(val) {
            return val && val !== "" ? val : "-";
        }

        // isi data
        document.getElementById("nama").innerText = safe(data.nama);
        document.getElementById("bpjs").innerText = safe(data.bpjs);
        document.getElementById("diagnosa").innerText = safe(data.diagnosa);
        document.getElementById("lahir").innerText = safe(data.lahir);
        document.getElementById("program").innerText = safe(data.program);
        document.getElementById("keterangan").innerText = safe(data.keterangan);
        document.getElementById("saran").innerText = safe(data.saran);
        document.getElementById("resep").innerText = safe(data.resep);

        // FKTP (kepada)
        document.getElementById("fktpTujuan").innerText = safe(data.fktp);

        // dokter
        document.getElementById("dokter").innerText = safe(data.dokter);

        // nomor SRB
        document.getElementById("nosrb").innerText =
            data.nosrb || "SRB-" + Date.now();

        // tanggal
        let today = new Date();
        let tgl = today.toLocaleDateString("id-ID", {
            day: "numeric",
            month: "long",
            year: "numeric"
        });
        document.getElementById("tgl").innerText = tgl;

    </script>

</body>

</html>
