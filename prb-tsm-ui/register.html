<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="logobpjs.png">
    <title>Register PRB TSM</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white rounded-2xl shadow-lg p-10 w-[420px]">

        <h2 class="text-2xl font-bold text-center mb-6">
            Register Akun
        </h2>

        <label class="text-sm font-medium">Nama Lengkap</label>

        <input type="text" placeholder="Masukkan nama lengkap"
            class="w-full border rounded-lg p-3 mt-1 mb-4 focus:ring-2 focus:ring-green-500 outline-none">

        <label class="text-sm font-medium">Username</label>

        <input type="text" placeholder="Masukkan username"
            class="w-full border rounded-lg p-3 mt-1 mb-4 focus:ring-2 focus:ring-green-500 outline-none">

        <label class="text-sm font-medium">Password</label>

        <input type="password" placeholder="Masukkan password"
            class="w-full border rounded-lg p-3 mt-1 mb-4 focus:ring-2 focus:ring-green-500 outline-none">

        <label class="text-sm font-medium">Konfirmasi Password</label>

        <input type="password" placeholder="Ulangi password"
            class="w-full border rounded-lg p-3 mt-1 mb-6 focus:ring-2 focus:ring-green-500 outline-none">

        <button class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">
            Daftar
        </button>

        <p class="text-center text-sm text-gray-500 mt-4">
            Sudah punya akun?
            <a href="login.html" class="text-green-600 font-semibold hover:underline">
                Login
            </a>
        </p>

    </div>

</body>

</html>
